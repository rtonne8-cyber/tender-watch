# T&D (transmission & distribution) sector relevance allowlist.
# Original 10-code starter set built from domain knowledge. Expanded
# 2026-06 against a full CPV-taxonomy review (cpv_engineering_codes_tender_
# review.xlsx) — see TenderWatch chat history for the per-code rationale.
# The reviewed-but-excluded codes (generic equipment/plant hire, lab
# instruments, oil & gas, telecoms, water/gas utilities, generation/solar)
# are deliberately left out: they're exactly the kind of broad/generic code
# that caused a real false positive (an unrelated equipment-hire tender
# auto-scored via one incidental "Transformers" tag) before the primary/
# secondary CPV fix.
#
# 45310000 "Electrical installation work" was tried and removed: as a
# primary classification it caught one genuine DNO-upgrade-support project
# but also a flood of unrelated building electrical work (chiller
# replacement, ATEX remedials, school rewiring, routine EICR inspections)
# — too generic to auto-trust, same reasoning as the already-excluded
# sibling 45315000 (building heating/electrical equipment). Genuinely
# T&D-relevant cases still reach the Haiku gate via the existing \bDNO\b
# keyword.

