# Tier 3 signal sources — trade-press RSS, signals only, never confirmed notices.
# Current± is discontinued (redirects to a JS-rendered site with no RSS as of
# June 2026); Energy Live News substitutes for it.

feeds:
  - name: utility_week
    url: "https://utilityweek.co.uk/feed/"
  - name: renews
    url: "https://www.renews.biz/feed/"
  - name: utility_dive
    url: "https://www.utilitydive.com/feeds/news/"
  - name: energy_live_news
    url: "https://www.energylivenews.com/feed/"

# Relevance filter for Tier 3 signals — kept separate from
# scoring/keywords.yaml on purpose (Tier 3 must never import scoring.*).
# Matched against each entry's title + summary at fetch time; the summary
# itself is never stored (headline + link only, per CLAUDE.md).
signal_keywords:
  - "substation"
  - "switchgear"
  - "transmission line"
  - "transmission network"
  - "distribution network"
  - "grid connection"
  - "overhead line"
  - "underground cable"
  - "cable route"
  - "gas[- ]insulated switchgear"
  - "\\bGIS\\b"
  - "\\bEHV\\b"
  - "\\bHVDC\\b"
  - "\\bHV\\b"
  - "battery storage"
  - "Battery Energy Storage Systems"
  - "BESS"
  - "primary plant"
  - "secondary plant"
  - "\\bDNO\\b"
  - "132kV"
  - "275kV"
  - "400kV"
  - "11kV"
  - "33kV"
  - "protection relay"
  - "RIIO"
  - "OFGEM"
  - "national grid"
  - "\\bNGET\\b"
  - "\\bSSE\\b"
  - "\\bSPT\\b"
  - "Eirgrid"
  - "NESO"
  - "interconnector"
  - "new grid capacity"
  - "grid reinforcement"
  - "network operator"
  - "transmission owner"
  - "distribution network operator"
  - "offshore wind farm"
  - "onshore wind farm"
