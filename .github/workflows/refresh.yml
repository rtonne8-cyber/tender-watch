name: Refresh tender data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Tier 1/2 fetchers + scoring
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Run Tier 3 signal fetchers
        run: python run_signals.py

      - name: Commit updated data
        run: |
          git config user.name "tenderwatch-bot"
          git config user.email "actions@github.com"
          git add data/tenders.json data/signals.json
          git diff --cached --quiet || git commit -m "chore: refresh tender data"
          git push
